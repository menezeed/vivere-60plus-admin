<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida Ativa 60+ · Admin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green:    #1B6B45;
    --green-l:  #E1F5EE;
    --green-m:  #2d8a5e;
    --bg:       #F8F7F2;
    --white:    #ffffff;
    --border:   #D3D1C7;
    --text:     #1C1C1A;
    --muted:    #73726C;
    --danger:   #DC2626;
    --warn:     #D97706;
    --warn-l:   #FEF3C7;
    --radius:   14px;
    --shadow:   0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { font-family: 'DM Serif Display', serif; }

  /* Layout */
  .layout    { display: flex; min-height: 100vh; }
  .sidebar   { width: 240px; background: var(--green); color: #fff; display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
  .main      { flex: 1; overflow-y: auto; }

  /* Sidebar */
  .sidebar-logo  { padding: 28px 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .sidebar-logo h1 { font-size: 18px; color: #fff; line-height: 1.3; }
  .sidebar-logo span { font-size: 12px; opacity: 0.65; font-family: 'DM Sans'; font-weight: 400; }
  .sidebar-nav   { flex: 1; padding: 16px 0; }
  .nav-item      { display: flex; align-items: center; gap: 12px; padding: 12px 24px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.15s; color: rgba(255,255,255,0.75); border-left: 3px solid transparent; }
  .nav-item:hover    { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active   { background: rgba(255,255,255,0.12); color: #fff; border-left-color: #fff; }
  .nav-item .icon    { font-size: 18px; width: 24px; text-align: center; }
  .sidebar-footer    { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.15); font-size: 13px; opacity: 0.6; }

  /* Topbar */
  .topbar    { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h2 { font-size: 22px; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  /* Content */
  .content   { padding: 28px 32px; }

  /* Cards / Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card  { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; }
  .stat-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 32px; font-family: 'DM Serif Display'; color: var(--green); }
  .stat-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* Table */
  .table-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; flex: 1; max-width: 320px; }
  .search-box input { border: none; background: none; outline: none; font-size: 14px; font-family: 'DM Sans'; color: var(--text); width: 100%; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--bg); padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .badge-green  { background: var(--green-l); color: var(--green); }
  .badge-warn   { background: var(--warn-l); color: var(--warn); }
  .badge-gray   { background: #F1EFE8; color: var(--muted); }
  .badge-red    { background: #FEE2E2; color: var(--danger); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 9px; font-size: 14px; font-weight: 600; font-family: 'DM Sans'; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary  { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-m); }
  .btn-outline  { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }
  .btn-danger   { background: transparent; color: var(--danger); border: 1px solid #FCA5A5; }
  .btn-danger:hover { background: #FEE2E2; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal { background: var(--white); border-radius: 18px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-head { padding: 24px 28px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 20px; }
  .modal-body { padding: 20px 28px 28px; }
  .modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

  /* Form */
  .form-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full   { grid-column: 1 / -1; }
  .form-group  { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--border); border-radius: 9px; padding: 10px 12px;
    font-size: 14px; font-family: 'DM Sans'; color: var(--text); background: var(--bg);
    outline: none; transition: border 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-check  { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }
  .form-check input { width: 16px; height: 16px; accent-color: var(--green); }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* Login */
  .login-page  { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--green); }
  .login-card  { background: var(--white); border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .login-logo  { text-align: center; margin-bottom: 28px; }
  .login-logo h1 { font-size: 26px; color: var(--green); }
  .login-logo p  { font-size: 14px; color: var(--muted); margin-top: 4px; }
  .login-error { background: #FEE2E2; color: var(--danger); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 200; box-shadow: var(--shadow); animation: slideUp 0.2s ease; }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--danger); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Empty */
  .empty { text-align: center; padding: 48px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pagination { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); justify-content: flex-end; font-size: 13px; color: var(--muted); }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .sidebar { width: 200px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── Supabase client (vanilla) ───────────────────────────────
const SUPABASE_URL = 'https://ccpqngyupukdefaqvzgl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjcHFuZ3l1cHVrZGVmYXF2emdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDE3MjcsImV4cCI6MjA5NjE3NzcyN30.Eaxk97QsgM9vemXkpiW2GuA3ZPgYjpA8WI6DeFIj0Os';

const db = {
  token: null,
  getHeaders() {
    const token = this.token || SUPABASE_KEY;
    return { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
  },
  async get(table, params = '') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: this.getHeaders() });
    return r.json();
  },
  async post(table, body) {
    console.log('POST', table, JSON.stringify(body), 'token:', this.token ? 'OK' : 'MISSING');
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: this.getHeaders(), body: JSON.stringify(body) });
    const text = await r.text();
    console.log('POST response:', r.status, text);
    try { return JSON.parse(text); } catch { return {}; }
  },
  async patch(table, id, body) {
    console.log('PATCH', table, id, 'token:', this.token ? 'OK' : 'MISSING');
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: this.getHeaders(), body: JSON.stringify(body) });
    const data = await r.json();
    console.log('PATCH response:', r.status, data);
    return data;
  },
  async delete(table, id) {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: this.getHeaders() });
  },
  async auth(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    return r.json();
  }
};

// ─── Toast ───────────────────────────────────────────────────
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`}>{msg}</div>;
}

// ─── Login ───────────────────────────────────────────────────
function LoginPage({ onLogin }) {
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const data = await db.auth(email, password);
    if (data.access_token) {
      db.token = data.access_token;
      sessionStorage.setItem('sb_token', data.access_token);
      onLogin(data);
    } else {
      setError('Email ou senha inválidos.');
    }
    setLoading(false);
  }

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <h1>🌿 Vida Ativa 60+</h1>
          <p>Painel de Administração</p>
        </div>
        {error && <div className="login-error">{error}</div>}
        <form onSubmit={handleLogin}>
          <div className="form-group" style={{marginBottom:14}}>
            <label>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@exemplo.com" required />
          </div>
          <div className="form-group" style={{marginBottom:20}}>
            <label>Senha</label>
            <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} disabled={loading}>
            {loading ? 'Entrando...' : 'Entrar'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── Modal genérico ──────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h3>{title}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}

// ─── Activities ──────────────────────────────────────────────
function ActivitiesTab({ showToast }) {
  const [rows, setRows]       = useState([]);
  const [venues, setVenues]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch]   = useState('');
  const [modal, setModal]     = useState(null); // null | 'new' | row
  const [form, setForm]       = useState({});
  const [saving, setSaving]   = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    setLoading(true);
    const [acts, vens] = await Promise.all([
      db.get('activities', 'order=created_at.desc'),
      db.get('venues', 'order=name.asc&select=id,name'),
    ]);
    setRows(Array.isArray(acts) ? acts : []);
    setVenues(Array.isArray(vens) ? vens : []);
    setLoading(false);
  }

  function openNew() {
    setForm({ title:'', description:'', category:'', venue_id:null, schedule:'', price:0, is_free:false, is_sponsored:false, start_date:null, end_date:null, recurrence_type:'none', recurrence_days:[], recurrence_time:'' });
    setModal('new');
  }

  function openEdit(row) {
    setForm({...row});
    setModal(row);
  }

  async function save() {
    setSaving(true);
    try {
      // Clean empty UUID fields to null
      const cleanForm = {...form};
      if (!cleanForm.venue_id) cleanForm.venue_id = null;
      if (!cleanForm.start_date) cleanForm.start_date = null;
      if (!cleanForm.end_date) cleanForm.end_date = null;
      if (modal === 'new') {
        const now = new Date();
        const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const body = { ...cleanForm, start_date: cleanForm.start_date || today };
        await db.post('activities', body);
        showToast('Atividade criada!', 'success');
      } else {
        await db.patch('activities', form.id, cleanForm);
        showToast('Atividade atualizada!', 'success');
      }
      setModal(null); load();
    } catch { showToast('Erro ao salvar.', 'error'); }
    setSaving(false);
  }

  async function remove(id) {
    if (!confirm('Apagar esta atividade?')) return;
    await db.delete('activities', id);
    showToast('Atividade apagada.', 'success');
    load();
  }

  const CATS = ['Teatro','Shows','Cursos','Esportes','Museu','Outro'];
  const filtered = rows.filter(r => r.title?.toLowerCase().includes(search.toLowerCase()));

  return (
    <>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Total</div><div className="stat-value">{rows.length}</div></div>
        <div className="stat-card"><div className="stat-label">Activas</div><div className="stat-value">{rows.filter(r=>!r.end_date||new Date(r.end_date)>=new Date()).length}</div></div>
        <div className="stat-card"><div className="stat-label">Gratuitas</div><div className="stat-value">{rows.filter(r=>r.is_free).length}</div></div>
        <div className="stat-card"><div className="stat-label">Patrocinadas</div><div className="stat-value">{rows.filter(r=>r.is_sponsored).length}</div></div>
      </div>

      <div className="table-card">
        <div className="table-header">
          <div className="search-box">
            <span>🔍</span>
            <input placeholder="Pesquisar atividade..." value={search} onChange={e=>setSearch(e.target.value)} />
          </div>
          <button className="btn btn-primary" onClick={openNew}>+ Nova Atividade</button>
        </div>
        {loading ? <div className="loading"><div className="spinner"/><div>Carregando...</div></div> :
        filtered.length === 0 ? <div className="empty"><div className="icon">📅</div><div>Nenhuma atividade encontrada.</div></div> :
        <table>
          <thead><tr><th>Título</th><th>Categoria</th><th>Recorrência</th><th>Horário</th><th>Preço</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filtered.map(r => (
              <tr key={r.id}>
                <td><strong>{r.title}</strong></td>
                <td><span className="badge badge-gray">{r.category}</span></td>
                <td>{r.recurrence_type && r.recurrence_type!=='none' ? <span className="badge badge-green">{r.recurrence_type==='daily'?'Diário':r.recurrence_type==='weekly'?'Semanal':'Mensal'}</span> : <span className="badge badge-gray">Único</span>}</td>
                <td style={{color:'var(--muted)',fontSize:13}}>{r.schedule}</td>
                <td>{r.is_free ? <span className="badge badge-green">Grátis</span> : `R$ ${r.price}`}</td>
                <td>{r.is_sponsored ? <span className="badge badge-warn">Parceiro</span> : <span className="badge badge-gray">Normal</span>}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-outline btn-sm" onClick={()=>openEdit(r)}>✏️ Editar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>remove(r.id)}>🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>

      {modal !== null && (
        <Modal title={modal==='new'?'Nova Atividade':'Editar Atividade'} onClose={()=>setModal(null)}>
          <div className="form-grid">
            <div className="form-group form-full">
              <label>Título</label>
              <input value={form.title||''} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Nome da atividade" />
            </div>
            <div className="form-group form-full">
              <label>Descrição</label>
              <textarea value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Descrição da atividade" />
            </div>
            <div className="form-group">
              <label>Categoria</label>
              <select value={form.category||''} onChange={e=>setForm({...form,category:e.target.value})}>
                <option value="">Selecionar...</option>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Local (Venue)</label>
              <select value={form.venue_id||''} onChange={e=>setForm({...form,venue_id:e.target.value})}>
                <option value="">Selecionar...</option>
                {venues.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Horário</label>
              <input value={form.schedule||''} onChange={e=>setForm({...form,schedule:e.target.value})} placeholder="Ex: Hoje · 19:00" />
            </div>
            <div className="form-group">
              <label>Preço (R$)</label>
              <input type="number" value={form.price||0} onChange={e=>setForm({...form,price:parseFloat(e.target.value)})} />
            </div>
            <div className="form-group">
              <label>Data Início</label>
              <input type="date" value={form.start_date?.slice(0,10)||''} onChange={e=>setForm({...form,start_date:e.target.value})} />
            </div>
            <div className="form-group">
              <label>Data Fim</label>
              <input type="date" value={form.end_date?.slice(0,10)||''} onChange={e=>setForm({...form,end_date:e.target.value})} />
            </div>
            <div className="form-group">
              <label>URL da Imagem</label>
              <input value={form.imagem_url||''} onChange={e=>setForm({...form,imagem_url:e.target.value})} placeholder="https://..." />
            </div>
            <div className="form-group form-full">
              <label>Telefone (com código do país)</label>
              <input value={form.phone||''} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+55 11 99999-9999" />
            </div>
            <div className="form-group form-full">
              <label>Recorrência</label>
              <select value={form.recurrence_type||'none'} onChange={e=>setForm({...form,recurrence_type:e.target.value,recurrence_days:[]})}>
                <option value="none">Evento único</option>
                <option value="daily">Diário</option>
                <option value="weekly">Semanal</option>
                <option value="monthly">Mensal</option>
              </select>
            </div>
            {(form.recurrence_type==='weekly'||form.recurrence_type==='monthly') && (
              <div className="form-group form-full">
                <label>{form.recurrence_type==='weekly'?'Dias da semana':'Dias do mês'}</label>
                {form.recurrence_type==='weekly' ? (
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}}>
                    {['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map((d,i)=>{
                      const days = form.recurrence_days||[];
                      const sel  = days.includes(i);
                      return (
                        <button key={i} type="button"
                          style={{padding:'6px 14px',borderRadius:20,border:'1px solid',fontSize:13,fontWeight:600,cursor:'pointer',

                            const days = form.recurrence_days||[];
                            setForm({...form, recurrence_days: sel?days.filter(x=>x!==i):[...days,i].sort()});
                          }}>{d}</button>
                      );
                    })}
                  </div>
                ) : (
                  <input type="number" min="1" max="31" value={(form.recurrence_days||[])[0]||''}
                    onChange={e=>setForm({...form,recurrence_days:[parseInt(e.target.value)]})}

            )}
            {form.recurrence_type && form.recurrence_type!=='none' && (

            )}
            <div className="form-group" style={{justifyContent:'flex-end',flexDirection:'row',gap:16,alignItems:'center'}}>
              <label className="form-check">
                <input type="checkbox" checked={form.is_free||false} onChange={e=>setForm({...form,is_free:e.target.checked})} /> Gratuita
              </label>
              <label className="form-check">
                <input type="checkbox" checked={form.is_sponsored||false} onChange={e=>setForm({...form,is_sponsored:e.target.checked})} /> Patrocinada
              </label>
            </div>

            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Salvando...':'Salvar'}</button>

}

// ─── Venues ──────────────────────────────────────────────────
function VenuesTab({ showToast }) {
  const [rows, setRows]       = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch]   = useState('');
  const [modal, setModal]     = useState(null);
  const [form, setForm]       = useState({});
  const [saving, setSaving]   = useState(false);

  useEffect(() => { load(); }, []);

  async function load() {
    setLoading(true);
    const data = await db.get('venues', 'order=name.asc');
    setRows(Array.isArray(data) ? data : []);
    setLoading(false);
  }

  const [addrQuery, setAddrQuery] = React.useState('');
  const [addrResults, setAddrResults] = React.useState([]);
  const addrTimer = React.useRef(null);

  function searchAddr(text) {
    if (addrTimer.current) clearTimeout(addrTimer.current);
    if (text.length < 3) { setAddrResults([]); return; }
    addrTimer.current = setTimeout(async () => {
      try {
        const res = await fetch('https://places.googleapis.com/v1/places:autocomplete', {
          method: 'POST',
          headers: {'Content-Type':'application/json','X-Goog-Api-Key':'AIzaSyD4dc8WP4rgEtVA-GX5VfYdZE4NbwHJX0g'},
          body: JSON.stringify({input: text}),
        });
        const data = await res.json();
        setAddrResults(data.suggestions ?? []);
      } catch { setAddrResults([]); }
    }, 400);
  }

  async function pickAddr(suggestion) {
    try {
      const placeId = suggestion.placePrediction?.placeId;
      const res = await fetch(`https://places.googleapis.com/v1/places/${placeId}`, {
        headers: {'X-Goog-Api-Key':'AIzaSyD4dc8WP4rgEtVA-GX5VfYdZE4NbwHJX0g','X-Goog-FieldMask':'location,formattedAddress'},
      });
      const data = await res.json();
      const fullText = suggestion.placePrediction?.text?.text ?? '';
      setForm(f => ({...f, address: data.formattedAddress || fullText, lat: data.location?.latitude ?? '', lng: data.location?.longitude ?? ''}));
      setAddrQuery(data.formattedAddress || fullText);
      setAddrResults([]);
    } catch(e) { console.error(e); }
  }

  function openNew() { setForm({name:'',address:'',category:'',lat:'',lng:''}); setModal('new'); setAddrQuery(''); setAddrResults([]); }
  function openEdit(row) { setForm({...row}); setModal(row); }

  async function save() {
    setSaving(true);
    try {
      const lat = parseFloat(String(form.lat).replace(',', '.'));
      const lng = parseFloat(String(form.lng).replace(',', '.'));
      if (isNaN(lat) || isNaN(lng)) { showToast('Coordenadas inválidas!','error'); setSaving(false); return; }
      if (lat < -90 || lat > 90)   { showToast('Latitude inválida! Deve ser entre -90 e 90','error'); setSaving(false); return; }
      if (lng < -180 || lng > 180) { showToast('Longitude inválida! Deve ser entre -180 e 180','error'); setSaving(false); return; }
      const body = {...form, lat, lng};
      if (modal==='new') { await db.post('venues', body); showToast('Local criado!','success'); }
      else { await db.patch('venues', form.id, body); showToast('Local atualizado!','success'); }
      setModal(null); load();
    } catch { showToast('Erro ao salvar.','error'); }
    setSaving(false);
  }

  async function remove(id) {
    if (!confirm('Apagar este local?')) return;
    await db.delete('venues', id);
    showToast('Local apagado.','success'); load();
  }

  const filtered = rows.filter(r => r.name?.toLowerCase().includes(search.toLowerCase()));

  return (
    <>
      <div className="table-card">
        <div className="table-header">
          <div className="search-box">
            <span>🔍</span>
            <input placeholder="Pesquisar local..." value={search} onChange={e=>setSearch(e.target.value)} />
          </div>
          <button className="btn btn-primary" onClick={openNew}>+ Novo Local</button>
        </div>
        {loading ? <div className="loading"><div className="spinner"/><div>Carregando...</div></div> :
        filtered.length===0 ? <div className="empty"><div className="icon">📍</div><div>Nenhum local encontrado.</div></div> :
        <table>
          <thead><tr><th>Nome</th><th>Endereço</th><th>Categoria</th><th>Coordenadas</th><th></th></tr></thead>
          <tbody>
            {filtered.map(r=>(
              <tr key={r.id}>
                <td><strong>{r.name}</strong></td>
                <td style={{color:'var(--muted)',fontSize:13}}>{r.address}</td>
                <td><span className="badge badge-gray">{r.category}</span></td>
                <td>{r.recurrence_type && r.recurrence_type!=='none' ? <span className="badge badge-green">{r.recurrence_type==='daily'?'Diário':r.recurrence_type==='weekly'?'Semanal':'Mensal'}</span> : <span className="badge badge-gray">Único</span>}</td>
                <td style={{color:'var(--muted)',fontSize:12}}>{r.lat?.toFixed(4)}, {r.lng?.toFixed(4)}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-outline btn-sm" onClick={()=>openEdit(r)}>✏️ Editar</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>remove(r.id)}>🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>}
      </div>

      {modal!==null && (
        <Modal title={modal==='new'?'Novo Local':'Editar Local'} onClose={()=>setModal(null)}>
          <div className="form-grid">
            <div className="form-group form-full"><label>Nome</label><input value={form.name||''} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nome do local" /></div>
            <div className="form-group form-full"><label>Endereço</label><input value={form.address||''} onChange={e=>setForm({...form,address:e.target.value})} placeholder="Rua, número, cidade" /></div>
            <div className="form-group"><label>Categoria</label><input value={form.category||''} onChange={e=>setForm({...form,category:e.target.value})} placeholder="Ex: Teatro" /></div>
            <div className="form-group form-full" style={{position:'relative'}}>
              <label>Endereço (pesquisar)</label>
              <input value={addrQuery} onChange={e=>{setAddrQuery(e.target.value);searchAddr(e.target.value);}} placeholder="Digite o endereço ou nome do local..." autoComplete="off" />
              {addrResults.length>0 && (
                <div style={{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid var(--border)',borderRadius:8,zIndex:100,boxShadow:'0 4px 12px rgba(0,0,0,0.12)',maxHeight:200,overflowY:'auto'}}>
                  {addrResults.map((r,i)=>(
                    <div key={i} onClick={()=>pickAddr(r)} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:13}}
                      onMouseEnter={e=>e.currentTarget.style.background='var(--bg)'}
                      onMouseLeave={e=>e.currentTarget.style.background='#fff'}
                    >
                      <div style={{fontWeight:600}}>{r.placePrediction?.text?.text?.split(',')[0]}</div>
                      <div style={{color:'var(--muted)',fontSize:12}}>{r.placePrediction?.text?.text?.split(',').slice(1).join(',').trim()}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="form-group form-full"><label>Endereço completo</label><input value={form.address||''} onChange={e=>setForm({...form,address:e.target.value})} placeholder="Preenchido automaticamente" /></div>
            <div className="form-group"><label>Latitude</label><input readOnly value={form.lat||''} style={{background:'var(--bg)',color:'var(--muted)'}} placeholder="Auto" /></div>
            <div className="form-group"><label>Longitude</label><input readOnly value={form.lng||''} style={{background:'var(--bg)',color:'var(--muted)'}} placeholder="Auto" /></div>
            <div className="form-group form-full"><label>Horário de Funcionamento</label><input value={form.opening_hours||''} onChange={e=>setForm({...form,opening_hours:e.target.value})} placeholder="Seg-Sex 9h-18h / Sáb 9h-13h" /></div>
            <div className="form-group form-full"><label>Website</label><input value={form.website||''} onChange={e=>setForm({...form,website:e.target.value})} placeholder="https://..." /></div>
            <div className="form-group form-full"><label>Telefone (com código do país)</label><input value={form.phone||''} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+55 11 99999-9999" /></div>
            <div className="form-group form-full"><label>URL da Imagem</label><input value={form.image_url||''} onChange={e=>setForm({...form,image_url:e.target.value})} placeholder="https://..." /></div>
          </div>
          <div className="form-actions">
            <button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'Salvando...':'Salvar'}</button>
          </div>
        </Modal>
      )}
    </>
  );
}

function UsersTab({ showToast }) {

  const [search, setSearch]   = useState('');

  useEffect(() => { load(); }, []);

  async function load() {
    setLoading(true);
    const [users, favs] = await Promise.all([
      db.get('users', 'order=created_at.desc'),
      db.get('favorites', 'select=user_id'),
    ]);
    setRows(Array.isArray(users) ? users : []);
    const map = {};
    (Array.isArray(favs) ? favs : []).forEach(f => {
      map[f.user_id] = (map[f.user_id] || 0) + 1;
    });
    setFavMap(map);
    setLoading(false);
  }

  const filtered = rows.filter(r =>
    r.email?.toLowerCase().includes(search.toLowerCase()) ||
    r.display_name?.toLowerCase().includes(search.toLowerCase())

  return (
    <div className="table-card">

              <td style={{color:'var(--muted)',fontSize:13}}>{r.email}</td>

}

                  ))}
                </div>
                <button className="btn btn-outline" style={{width:'100%',marginTop:16,justifyContent:'center'}} onClick={() => { setShowLocModal(false); setLocQuery(''); setLocResults([]); }}>Fechar</button>
              </div>
            </div>
          )}
        </div>
        <div className="content">
          {tab==='activities' && <ActivitiesTab showToast={showToast} />}
          {tab==='venues'     && <VenuesTab     showToast={showToast} />}
          {tab==='partners'   && <PartnersTab   showToast={showToast} />}
          {tab==='users'      && <UsersTab      showToast={showToast} />}
        </div>
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
